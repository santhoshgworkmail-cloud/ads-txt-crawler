<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ads.txt Crawler 🚀</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; }
        h2 { margin-bottom: 20px; }
        textarea { width: 100%; height: 100px; padding: 8px; margin-bottom: 10px; }
        input[type="email"] { width: 100%; padding: 8px; margin-bottom: 10px; }
        button { background-color:#007BFF; color:white; border:none; padding:10px 16px; font-size:16px; cursor:pointer; border-radius:4px; }
        button:hover { background-color:#0056b3; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 8px 12px; border: 1px solid #ccc; text-align: left; }
        th { background-color: #f0f0f0; }
        .found { color: green; font-weight: bold; }
        .missing { color: red; font-weight: bold; }
        #download-csv-btn { display: inline-flex; align-items: center; margin-bottom: 12px; }
        #download-csv-btn span { margin-right: 6px; font-size: 18px; }
    </style>
</head>
<body>
    <h2>Ads.txt Crawler 🚀</h2>

    <form method="POST">
        <textarea name="urls" placeholder="Paste ads.txt URLs (one per line)">{{ request.form.get('urls', '') }}</textarea>
        <textarea name="lines" placeholder="Paste ads.txt lines to check">{{ request.form.get('lines', '') }}</textarea>

        <input type="email" name="email" placeholder="Enter email (optional)" value="{{ request.form.get('email', '') }}">
        <button type="submit">Run Check</button>
    </form>

    {% if results %}
        <!-- Modern Download Button -->
        <button id="download-csv-btn"><span>⬇️</span>Download CSV</button>

        <!-- Results Table -->
        <table>
            <tr>
                <th>URL</th>
                <th>Line</th>
                <th>Status</th>
            </tr>
            {% for r in results %}
            <tr>
                <td>{{ r.url }}</td>
                <td>{{ r.line }}</td>
                <td class="{{ 'found' if r.status else 'missing' }}">
                    {{ 'FOUND' if r.status else 'MISSING' }}
                </td>
            </tr>
            {% endfor %}
        </table>
    {% endif %}

    <script>
    document.getElementById("download-csv-btn")?.addEventListener("click", function(e){
        e.preventDefault();

        const form = document.createElement("form");
        form.method = "POST";
        form.style.display = "none";

        const urlsInput = document.createElement("input");
        urlsInput.name = "urls";
        urlsInput.value = document.querySelector("textarea[name='urls']").value;
        form.appendChild(urlsInput);

        const linesInput = document.createElement("input");
        linesInput.name = "lines";
        linesInput.value = document.querySelector("textarea[name='lines']").value;
        form.appendChild(linesInput);

        const downloadInput = document.createElement("input");
        downloadInput.name = "download";
        downloadInput.value = "csv";
        form.appendChild(downloadInput);

        document.body.appendChild(form);
        form.submit();
        document.body.removeChild(form);
    });
    </script>
</body>
</html>
